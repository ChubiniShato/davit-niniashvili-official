spring.application.name=davit-niniashvili-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/davit_website
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# CORS Configuration (Allow React Frontend)
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Admin credentials (must be set via environment variables)
# Set ADMIN_USERNAME and ADMIN_PASSWORD_HASH before starting
admin.username=${ADMIN_USERNAME:}
admin.password.hash=${ADMIN_PASSWORD_HASH:}
